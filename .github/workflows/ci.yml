name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: pytest
        run: pytest -q

  javascript:
    name: JS suites (SDK + surfaces)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: node --test (every package)
        run: |
          set -e
          for d in sdk/js extension addins/word addins/google-docs clients/desktop clients/mobile; do
            echo "::group::$d"
            (cd "$d" && node --test)
            echo "::endgroup::"
          done
