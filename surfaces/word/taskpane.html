<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Help Me Write Better</title>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<style>
  :root { --bg:#0f1221; --ink:#e8eaf2; --muted:#9aa3b8; --accent:#6ea8fe; --line:#283049; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); padding:14px;
         font:14px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
  h1 { font-size:15px; margin:0 0 4px; }
  p.hint { color:var(--muted); font-size:12px; margin:0 0 12px; }
  label { display:block; font-size:11px; color:var(--muted); text-transform:uppercase;
          letter-spacing:.04em; margin:12px 0 5px; }
  select, input { width:100%; background:#0c0f1c; color:var(--ink); border:1px solid var(--line);
          border-radius:8px; padding:8px; font:inherit; }
  button { width:100%; margin-top:14px; padding:10px; border:0; border-radius:8px;
           background:var(--accent); color:#0a0e1a; font-weight:600; cursor:pointer; }
  button:disabled { opacity:.6; cursor:default; }
  .status { margin-top:10px; color:var(--muted); font-size:13px; min-height:18px; }
  details { margin-top:16px; } summary { color:var(--muted); font-size:12px; cursor:pointer; }
</style>
</head>
<body>
  <h1>Help Me Write Better</h1>
  <p class="hint">Select text in your document, pick a service, and Improve — it
     replaces the selection in place.</p>

  <label for="service">Service</label>
  <select id="service"></select>

  <button id="go" disabled>Improve selection</button>
  <div class="status" id="status">Loading…</div>

  <details>
    <summary>Settings</summary>
    <label for="apiBase">Engine URL</label>
    <input id="apiBase" type="text" placeholder="https://your-instance.example.com">
    <button id="save">Save</button>
  </details>

  <script src="config.js"></script>
  <script src="taskpane.js"></script>
</body>
</html>
