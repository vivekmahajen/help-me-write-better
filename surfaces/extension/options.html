<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root { --bg:#0f1221; --ink:#e8eaf2; --muted:#9aa3b8; --accent:#6ea8fe; --line:#283049; }
  body { max-width:520px; margin:40px auto; background:var(--bg); color:var(--ink);
         font:15px/1.6 system-ui,-apple-system,Segoe UI,Roboto,sans-serif; padding:0 20px; }
  h1 { font-size:18px; }
  label { display:block; font-size:12px; color:var(--muted); text-transform:uppercase;
          letter-spacing:.04em; margin:16px 0 6px; }
  input, select { width:100%; background:#0c0f1c; color:var(--ink); border:1px solid var(--line);
          border-radius:8px; padding:9px; font:inherit; }
  button { margin-top:16px; padding:9px 16px; border:0; border-radius:8px;
           background:var(--accent); color:#0a0e1a; font-weight:600; cursor:pointer; }
  .status { margin-left:12px; color:var(--muted); font-size:13px; }
  p.hint { color:var(--muted); font-size:13px; }
</style>
</head>
<body>
  <h1>Help Me Write Better — settings</h1>
  <p class="hint">Point the extension at your engine. The hosted JSON API, a self-hosted
     instance, or a local <code>http://localhost:8000</code> all work.</p>

  <label for="apiBase">Engine URL</label>
  <input id="apiBase" type="text" placeholder="https://your-instance.example.com">

  <label for="service">Default service (used by the right-click menu)</label>
  <select id="service"></select>

  <div>
    <button id="save">Save</button>
    <span class="status" id="status"></span>
  </div>

  <script src="config.js"></script>
  <script src="options.js"></script>
</body>
</html>
